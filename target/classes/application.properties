server.port=8087
spring.jpa.properties.hibernate.dialect= org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto= update


spring.datasource.url = jdbc:mysql://localhost:3306/testdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.driverClassName = com.mysql.cj.jdbc.Driver
spring.datasource.username = root
spring.datasource.password = Zhao_001

spring.datasource.initialSize=5
spring.datasource.minIdle=5
spring.datasource.maxActive=20
spring.datasource.maxWait=60000
spring.datasource.timeBetweenEvictionRunsMillis=60000
spring.datasource.minEvictableIdleTimeMillis=300000
spring.datasource.validationQuery=SELECT 1 FROM DUAL
spring.datasource.testWhileIdle=true
spring.datasource.testOnBorrow=false
spring.datasource.testOnReturn=false
spring.datasource.poolPreparedStatements=true
spring.datasource.maxPoolPreparedStatementPerConnectionSize=20
spring.datasource.filters=stat,wall,log4j


#mybatis.type-aliases-package=com.sm.demo.domain
mybatis.mapperLocations=classpath:mapper/*.xml


mqtt.client.enabled=true               # \u662F\u5426\u5F00\u542F\u5BA2\u6237\u7AEF\uFF0C\u9ED8\u8BA4\uFF1Afalse \u4F7F\u7528\u5230\u7684\u573A\u666F\u6709\u9650\uFF0C\u975E\u5FC5\u8981\u8BF7\u4E0D\u8981\u542F\u7528
mqtt.client.ip=127.0.0.1               # \u8FDE\u63A5\u7684\u670D\u52A1\u7AEF ip \uFF0C\u9ED8\u8BA4\uFF1A127.0.0.1
mqtt.client.port=1883                  # \u7AEF\u53E3\uFF1A\u9ED8\u8BA4\uFF1A1883
mqtt.client.name=Mica-Mqtt-Client      # \u540D\u79F0\uFF0C\u9ED8\u8BA4\uFF1AMica-Mqtt-Client
mqtt.client.clientId=000001            # \u5BA2\u6237\u7AEFId\uFF08\u975E\u5E38\u91CD\u8981\uFF0C\u4E00\u822C\u4E3A\u8BBE\u5907 sn\uFF0C\u4E0D\u53EF\u91CD\u590D\uFF09
mqtt.client.user-name=mica             # \u8BA4\u8BC1\u7684\u7528\u6237\u540D
mqtt.client.password=123456            # \u8BA4\u8BC1\u7684\u5BC6\u7801
mqtt.client.timeout=5                  # \u8D85\u65F6\u65F6\u95F4\uFF0C\u5355\u4F4D\uFF1A\u79D2\uFF0C\u9ED8\u8BA4\uFF1A5\u79D2
mqtt.client.reconnect=true             # \u662F\u5426\u91CD\u8FDE\uFF0C\u9ED8\u8BA4\uFF1Atrue
mqtt.client.re-interval=5000           # \u91CD\u8FDE\u65F6\u95F4\uFF0C\u9ED8\u8BA4 5000 \u6BEB\u79D2
mqtt.client.version=MQTT_5             # mqtt \u534F\u8BAE\u7248\u672C\uFF0C\u9ED8\u8BA4\uFF1A3.1.1
mqtt.client.read-buffer-size=8KB       # \u63A5\u6536\u6570\u636E\u7684 buffer size\uFF0C\u9ED8\u8BA4\uFF1A8k
mqtt.client.max-bytes-in-message=10MB  # \u6D88\u606F\u89E3\u6790\u6700\u5927 bytes \u957F\u5EA6\uFF0C\u9ED8\u8BA4\uFF1A10M
mqtt.client.buffer-allocator=heap      # \u5806\u5185\u5B58\u548C\u5806\u5916\u5185\u5B58\uFF0C\u9ED8\u8BA4\uFF1A\u5806\u5185\u5B58
mqtt.client.keep-alive-secs=60         # keep-alive \u65F6\u95F4\uFF0C\u5355\u4F4D\uFF1A\u79D2
mqtt.client.clean-session=true         # mqtt clean session\uFF0C\u9ED8\u8BA4\uFF1Atrue
mqtt.client.use-ssl=false              # \u662F\u5426\u542F\u7528 ssl\uFF0C\u9ED8\u8BA4\uFF1Afalse